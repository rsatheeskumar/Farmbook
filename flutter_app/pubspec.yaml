name: kisan_saathi
description: Voice-first AI farm companion for Indian farmers
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Audio recording & playback
  record: ^5.1.2
  audioplayers: ^6.1.0
  
  # HTTP
  http: ^1.2.2
  
  # Camera
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  
  # Local storage
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  
  # UI
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  
  # Permissions
  permission_handler: ^11.3.1
  
  # Connectivity
  connectivity_plus: ^6.0.5
  
  # Path
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700
